name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'
template: |
  ## Changes

  $CHANGES

  **Full Changelog**: https://github.com/$OWNER/$REPOSITORY/compare/$PREVIOUS_TAG...v$RESOLVED_VERSION
categories:
  - title: 'New Features'
    labels:
      - 'feat'
  - title: 'Bug Fixes'
    labels:
      - 'fix'
  - title: 'Performance'
    labels:
      - 'perf'
  - title: 'Documentation'
    labels:
      - 'docs'
  - title: 'CI/CD'
    labels:
      - 'ci'
  - title: 'Other'
    labels:
      - 'chore'
      - 'refactor'
      - 'test'
version-resolver:
  major:
    labels:
      - 'major'
  minor:
    labels:
      - 'feat'
      - 'minor'
  patch:
    labels:
      - 'fix'
      - 'perf'
      - 'chore'
      - 'refactor'
      - 'docs'
      - 'ci'
      - 'test'
  default: patch
autolabeler:
  - label: 'feat'
    title:
      - '/^feat/i'
  - label: 'fix'
    title:
      - '/^fix/i'
  - label: 'perf'
    title:
      - '/^perf/i'
  - label: 'docs'
    title:
      - '/^docs/i'
  - label: 'ci'
    title:
      - '/^ci/i'
  - label: 'chore'
    title:
      - '/^chore/i'
  - label: 'refactor'
    title:
      - '/^refactor/i'
  - label: 'test'
    title:
      - '/^test/i'
