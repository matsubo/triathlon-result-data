name: Build Data

on:
  push:
    branches: [main]
    paths:
      - 'master/**'
      - 'race-info.json'
      - 'scripts/**'
      - 'dist/result-schema.json'
      - '.github/workflows/build-data.yml'
  pull_request:
    paths:
      - 'master/**'
      - 'race-info.json'
      - 'scripts/**'
      - 'dist/result-schema.json'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run tests
        run: bun run test

      - name: Build normalized data
        run: bun run build

      - name: Commit dist/data.json if changed
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dist/data.json
          if git diff --cached --quiet; then
            echo "No changes to dist/data.json"
          else
            git commit -m "chore: rebuild dist/data.json [skip ci]"
            git push
          fi

      - name: Draft release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: release-drafter/release-drafter@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
