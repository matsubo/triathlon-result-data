name: Check Duplicate Editions

on:
  push:
    paths:
      - 'race-info.json'
      - 'master/**/*.tsv'
      - 'scripts/check-duplicate-editions.js'
      - 'duplicate-allowlist.json'
  pull_request:
    paths:
      - 'race-info.json'
      - 'master/**/*.tsv'
      - 'scripts/check-duplicate-editions.js'
      - 'duplicate-allowlist.json'
  workflow_dispatch:

jobs:
  check-duplicates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Check for duplicate race editions
        run: bun run check:duplicates
