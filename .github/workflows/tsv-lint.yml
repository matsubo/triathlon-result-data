name: TSV Lint

on:
  push:
    paths:
      - 'master/**/*.tsv'
      - 'tests/test-tsv-lint.js'
      - '.github/workflows/tsv-lint.yml'
  pull_request:
    paths:
      - 'master/**/*.tsv'
      - 'tests/test-tsv-lint.js'
      - '.github/workflows/tsv-lint.yml'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install
      - name: Run TSV lint
        run: bun run test:tsv-lint
