name: Check Data Integrity

on:
  push:
    paths:
      - 'race-info.json'
      - 'master/**/*.tsv'
      - 'scripts/check-integrity.js'
      - 'scripts/lib/**'
      - 'integrity-baseline.json'
  pull_request:
    paths:
      - 'race-info.json'
      - 'master/**/*.tsv'
      - 'scripts/check-integrity.js'
      - 'scripts/lib/**'
      - 'integrity-baseline.json'
  workflow_dispatch:

jobs:
  check-integrity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install
      - name: Check normalized-data integrity against baseline
        run: bun run check:integrity
